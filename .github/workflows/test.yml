name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install -e .

      - name: Debug imports
        run: |
          pwd
          ls -la
          python -c "import sys; print(sys.path)"
          python -c "import os; print(os.listdir('.'))"
          python -c "import diagnostic_insights; print('diagnostic_insights ok')"
          python -c "import cross_intern_patterns; print('cross_intern_patterns ok')"    

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest